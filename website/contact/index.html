<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="icon" href="../logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-main">
        <a href="../" class="home-btn">← Accueil</a>
        <button class="lang-btn" onclick="switchLang()">FR / EN</button>
    </header>

    <main class="content-wrapper">
        <div class="contact-card">
            <h1 id="title">Contact</h1>
            <p id="desc">Une question ? Une remarque ? Je suis à l'écoute.</p>
            
            <div class="suggestion-box">
                <strong id="suggest-title">Envie d'une nouvelle ville ?</strong>
                <p id="suggest-desc">Une suggestion ou une idée d'analyse, je suis preneur !</p>
            </div>
            
            <div class="social-links">
                <a href="mailto:contact@yodavatar.me" class="btn-grad btn-1">Email</a>
                <a href="https://t.me/yodavatar" target="_blank" class="btn-grad btn-2">Telegram</a>
                <a href="https://discordapp.com/users/794350261019344907" target="_blank" class="btn-grad btn-3">Discord</a>
                <a href="https://reddit.com/user/yodavatar" target="_blank" class="btn-grad btn-4">Reddit</a>
            </div>
        </div>
    </main>

    <script>
        const translations = {
            "title": { "fr": "Contact", "en": "Contact Us" },
            "desc": { "fr": "Une question ? Une remarque ? Je suis à l'écoute.", "en": "A question? A comment? I'm listening." },
            "suggest-title": { "fr": "Envie d'une nouvelle ville ?", "en": "Want a new city?" },
            "suggest-desc": { "fr": "Une suggestion ou une idée d'analyse, je suis preneur !", "en": "Any suggestions or analysis ideas? I'm all ears!" }
        };

        let currentLang = 'fr';

        function switchLang()
        {
            currentLang = (currentLang === 'fr') ? 'en' : 'fr';
                        for (const [id, texts] of Object.entries(translations)) {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = texts[currentLang];
                }
            }
        }
    </script>
</body>
</html>
